<svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="36" y2="36">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#6366F1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect
    x="0"
    y="0"
    width="36"
    height="36"
    rx="10"
    fill="url(#bg)"
    filter="url(#shadow)"
  />

  <!-- Text M -->
  <text
    x="18"
    y="23"
    text-anchor="middle"
    fill="#ffffff"
    font-size="18"
    font-weight="800"
    font-family="Inter, system-ui, sans-serif"
  >
    M
  </text>
</svg>